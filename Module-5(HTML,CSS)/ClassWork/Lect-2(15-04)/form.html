<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Example</title>
</head>
<body>
    <h1 align="center">Form Example</h1>
    <table align="center" border="1" cellspacing="10px" cellpadding="10px">
        <tr>
            <th>Enter Username:</th>
            <td><input type="text" name="" id="" required></td>
            <th>Email:</th>
            <td><input type="email" name="" id="" required></td>
        </tr>

        <tr>
            <th>Contact:</th>
            <td><input type="text" name="" id=""></td>
            <th>DOB:</th>
            <td><input type="date" name="" id=""></td>
        </tr>

        <tr>
            <th>Hobby:</th>
            <td>
                <input type="checkbox" name="" id="">Cricket
                <input type="checkbox" name="" id="">Badminton
                <input type="checkbox" name="" id="">Travel
                <input type="checkbox" name="" id="">Music
            </td>

            <th>Gender:</th>
            <td>
                <input type="radio" name="" id="">Male
                <input type="radio" name="" id="">Female
            </td>
        </tr>

        <tr>
            <th>Address:</th>
            <td><textarea name="" id=""></textarea></td>
            <th>City</th>
            <td>
                <select name="" id="">
                    <option value="">Cities</option>
                    <option value="">Surat</option>
                    <option value="">Bilimora</option>
                    <option value="">Navsari</option>
                </select>
            </td>
        </tr>

        <tr>
            <td colspan="4" align="center"><input type="submit" value="Submit"></td>
        </tr>
    </table>
</body>
</html>
