<!DOCTYPE html>
<html lang="en">
<head>

    <title>Rowspan-colspan</title>
</head>
<body>
    <h2>Row-span colspan Example</h2>
    <table border="1" cellspacing="10px" cellpadding="10px">
        <tr>
            <th colspan="4" >Title</th>
        </tr>
        <tr>
            <td colspan="2">Subtitle</td>
            <td colspan="2">Subtitle</td>
        </tr>
        <tr>
            <td>1 item</td>
            <td>123</td>
            <td>1 item</td>
            <td>123</td>
        </tr>
        <tr>
            <td>1 item</td>
            <td>123</td>
            <td>1 item</td>
            <td>123</td>
        </tr>
        <tr>
            <td>1 item</td>
            <td>123</td>
            <td>1 item</td>
            <td>123</td>
        </tr>
        <tr>
            <td>1 item</td>
            <td>123</td>
            <td>1 item</td>
            <td>123</td>
        </tr>

        <tr>
            <td colspan="2">Subtitle</td>
            <td colspan="2">Subtitle</td>
        </tr>
    </table>
</body>
</html>
