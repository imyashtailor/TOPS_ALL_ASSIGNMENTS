<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table-1</title>
</head>
<body>
    <table border="1" cellspacing="10px" cellpadding="10px">
        <h2>Table With colspan</h2>
        <tr>
            <td colspan="2">Person</td>
            <td colspan="2">Departments</td>
        </tr>
        <tr>
            <td>Name</td>
            <td rowspan="4">Photo</td>
            <td>Name</td>
            <td rowspan="1">Image</td>
        </tr>
        <tr>
            <td>Surname</td>
            <td>Structure</td>
        </tr>
        <tr>
            <td>State</td>
            <td>Floor</td>
            <td rowspan="1">QR code</td>
        </tr>
        <tr>
            <td>City</td>
            <td>Room</td>
        </tr>

        <tr>
            <td colspan="2">Email</td>
            <td colspan="2">Telphone.no</td>
        </tr>
    </table>
</body>
</html>
