<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table-2</title>
</head>
<body>
    <table border="1" cellspacing="10px" cellpadding="10px">
        <h2>Student & Employee Data</h2>
        <tr>
            <td colspan="5" align="center">Student & Employee Data List</td>
        </tr>
        <tr>
            <td colspan="2">Student Data</td>
            <td colspan="2">Employee Data</td>
        </tr>

        <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Name</th>
            <th>Salary</th>
        </tr>

        <tr>
            <td>Ravi</td>
            <td>IX</td>
            <td>Yash Tailor</td>
            <td rowspan="2">20,000</td>
        </tr>
        <tr>
            <td>Ganesh</td>
            <td rowspan="4">VII</td>
            <td>Kenil Marwala</td>
        </tr>
        <tr>
            <td>Vijay</td>
            <td>Sahil Patel</td>
            <td>18,500</td>
        </tr>
    </table>
</body>
</html>
