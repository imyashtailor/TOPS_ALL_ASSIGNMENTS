<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-shadow Property</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
            margin: 100px;
            /* border: 2px solid black; */
            border-radius: 20px;
            /*box-shadow property*/
            box-shadow: 3px 3px 5px grey;
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
