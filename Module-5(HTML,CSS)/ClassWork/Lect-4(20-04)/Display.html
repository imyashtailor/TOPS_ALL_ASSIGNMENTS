<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Property</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
            margin: 50px;
            /* border: 2px solid black; */
            border-radius: 20px;
            box-shadow: 5px 5px 6px gray;
            /*Display property*/
            /* display: inline; */
            display: inline-block;
            color: red;
        }
    </style>
</head>
<body>
    <div class="box">Yash Tailor</div>
    <div class="box">Kenil Marvawala</div>
    <div class="box">Sahil Patel</div>
    <div class="box">Raj Patel</div>
    <div class="box">Ankit Patel</div>
</body>
</html>
