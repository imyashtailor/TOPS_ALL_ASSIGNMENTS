<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-items</title>
    <style>
        .main {
            height: 600px;
            background-color: gray;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-items: flex-start;
        }

        .box {
            height: 100px;
            width: 100px;
            background-color: red;
            margin: 20px;
        }

        .box:nth-child(even) {
            align-self: flex-end;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="box" id="box-1" style="order: 4;flex-grow: 3;">box-1</div>
        <div class="box" id="box-2" style="order: 2;flex-shrink: 2;">box-2</div>
        <div class="box" id="box-3" style="order: 3;">box-3</div>
        <div class="box" id="box-4" style="order: 1;">box-4</div>
        <div class="box" id="box-5" style="order: 6;">box-5</div>
        <div class="box" id="box-6" style="order: 5;">box-6</div>
        <div class="box" id="box-7" style="order: 5;">box-7</div>
        <div class="box" id="box-8" style="order: 8;">box-8</div>
    </div>
</body>

</html>
