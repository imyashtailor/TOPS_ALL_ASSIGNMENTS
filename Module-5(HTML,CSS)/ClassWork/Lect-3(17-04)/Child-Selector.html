<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hero > h2{
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Child Combinator selector(>)</h1>
    <div class="hero">
        <h2>Hello World CSS</h2>
    </div>
    
    <h2>Good Morning!..</h2>
</body>
</html>
